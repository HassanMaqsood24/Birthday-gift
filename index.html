<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aisha's Birthday 🎉</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  overflow: hidden;
}

.card {
  background: rgba(255,255,255,0.15);
  border-radius: 25px;
  padding: 40px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  max-width: 500px;
  width: 90%;
  position: relative;
  z-index: 2;
}

.hidden { display: none; }

.date { display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: 900; margin-bottom: 15px; gap: 10px; }
.march-text { color: #ffd700; font-weight: 900; font-size: 2.5rem; }

#countdown { font-size: 2.5rem; margin-top: 15px; color: #ff5f6d; }

.question-btn {
  background: linear-gradient(45deg,#ff9a9e,#fad0c4);
  border: none;
  margin: 10px 0;
  padding: 15px;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 15px;
  color: white;
  transition: transform 0.2s, box-shadow 0.2s;
}
.question-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }

input[type=text] {
  width: 90%;
  margin: 15px auto;
  display: block;
  padding: 15px;
  border-radius: 25px;
  border: none;
  font-size: 1.2rem;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

#giftCardContainer { margin-top:20px; display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }

.giftCardBox {
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  padding: 20px 30px;
  border-radius: 20px;
  font-weight:700;
  font-size:1.1rem;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  color:white;
}
.giftCardBox:hover { transform: scale(1.05); box-shadow:0 10px 25px rgba(0,0,0,0.3); }

canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }

@media (max-width: 576px) {
  #countdown { font-size: 2rem; }
  .march-text { font-size: 2rem; }
}
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 15px 25px;
  border-radius: 15px;
  font-weight: 700;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  opacity: 0;
  transition: opacity 0.5s, transform 0.5s;
  z-index: 9999;
  color: white;
}
.toast.correct { background: linear-gradient(90deg,#43e97b,#38f9d7); }
.toast.wrong { background: linear-gradient(90deg,#ff6f91,#ff9671); }
</style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

<!-- MAIN SCREEN -->
<div class="card text-center" id="mainScreen">
  <div class="date">
    <span>✨</span>
    <span class="march-text">27 March</span>
    <span>🎈</span>
  </div>
  <h1>🎂 Aisha, it's your Birthday!</h1>
  <div id="typing"></div>
  <div id="countdown">Loading...</div>
</div>

<!-- QUESTION SCREEN -->
<div class="card text-center hidden" id="questionScreen">
  <p style="font-size:1.1rem;margin-bottom:20px;">Are you really Aisha? Let's check with some fun questions! 🎉</p>
  <h4 id="questionText">Question will appear here</h4>
  <div id="answersContainer"></div>
</div>

<!-- FINAL TEXT INPUT SCREEN -->
<div class="card text-center hidden" id="finalScreen">
  <h4>Last & hardest question! Type the 3 words correctly:</h4>
  <input type="text" placeholder="Word 1" id="input1">
  <input type="text" placeholder="Word 2" id="input2">
  <input type="text" placeholder="Word 3" id="input3">
  <button class="question-btn w-100" onclick="checkFinal()">Submit</button>
  <div id="finalMsg" style="margin-top:20px;"></div>
  <div id="giftCardContainer"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<canvas id="confetti"></canvas>
<canvas id="balloons"></canvas>

<script>
const typingText = "Hassan is waiting for your Birthday There is a special gift-card for you... 🎁";
let index = 0;
const typingEl = document.getElementById("typing");
function typeEffect() {
  if(index<typingText.length){
    typingEl.innerHTML+=typingText.charAt(index);
    index++;
    setTimeout(typeEffect,50);
  }
}
typeEffect();

const countdownEl = document.getElementById("countdown");
const targetDate = new Date("March 27, 2026 00:00:00").getTime();
function updateCountdown(){
  const now = new Date().getTime();
  const diff = targetDate - now;
  if(diff<=0){
    countdownEl.innerHTML = "🎉 Happy Birthday! 🎉";
    typingEl.innerHTML="";
    startConfetti();
    setTimeout(()=>{
      document.getElementById("mainScreen").classList.add("hidden");
      document.getElementById("questionScreen").classList.remove("hidden");
      balloons.forEach(b=>b.speed=0.3); 
      balloons.forEach(b=>b.r*=0.3);
      startQuestions();
    },5000);
    return;
  }
  const hours = Math.floor(diff / (1000*60*60));
  const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
  const seconds = Math.floor((diff%(1000*60))/1000);
  countdownEl.innerHTML=`${hours}:${minutes}:${seconds}`;
}
setInterval(updateCountdown,1000);

const questions = [
  {question:"When we first met?",answers:["10 April 2025","5 May 2025","1 Jan 2025","14 Feb 2025"],correct:"10 April 2025"},
  {question:"What I wore when we met?",answers:["Black Shalwar Kameez","Red Dress","White Shirt","Blue Jeans"],correct:"Black Shalwar Kameez"},
  {question:"What date our arrangement occur?",answers:["24 May 2025","12 June 2025","10 April 2025","1 Jan 2025"],correct:"24 May 2025"},
  {question:"What date my birthday is?",answers:["24 July","27 March","1 Jan","15 Aug"],correct:"24 July"}
];

let currentQ=0;
const questionText=document.getElementById("questionText");
const answersContainer=document.getElementById("answersContainer");
const toast=document.getElementById('toast');

function startQuestions(){ showQuestion(currentQ); }
function showQuestion(index){
  const q=questions[index];
  questionText.innerText=q.question;
  answersContainer.innerHTML="";
  q.answers.forEach(ans=>{
    const btn=document.createElement("button");
    btn.classList.add("question-btn","w-100");
    btn.innerText=ans;
    btn.onclick=()=>checkAnswer(ans);
    answersContainer.appendChild(btn);
  });
}

function showToast(msg="Correct ✅",type="correct"){
  toast.innerText=msg;
  toast.className=`toast ${type} show`;
  setTimeout(()=>{ toast.className=`toast ${type}`; },2000);
}

function checkAnswer(ans){
  const correctAnswer = questions[currentQ].correct;
  if(ans===correctAnswer){
    showToast();
    currentQ++;
    if(currentQ<questions.length){
      setTimeout(()=>{ showQuestion(currentQ); },1000);
    }else{
      setTimeout(()=>{
        document.getElementById("questionScreen").classList.add("hidden");
        document.getElementById("finalScreen").classList.remove("hidden");
        balloons.forEach(b=>b.speed=0); 
      },1000);
    }
  }else{
    showToast("Wrong ❌ Try again","wrong");
  }
}

function checkFinal(){
  const inputs=[
    document.getElementById("input1").value.trim().toLowerCase(),
    document.getElementById("input2").value.trim().toLowerCase(),
    document.getElementById("input3").value.trim().toLowerCase()
  ];

  const answer=["jaan","aishu","cutie"];
  const correct=answer.every(a=>inputs.includes(a));

  const finalMsg=document.getElementById("finalMsg");
  const giftContainer=document.getElementById("giftCardContainer");

  if(correct){

    // 🔴 Hide input fields after success
    document.getElementById("input1").style.display="none";
    document.getElementById("input2").style.display="none";
    document.getElementById("input3").style.display="none";
    document.querySelector("#finalScreen button").style.display="none";

    // ✅ Only ONE clean message
    finalMsg.innerHTML=`
      <h3 style="font-weight:800;">🎉 Congratulations Aisha! 🎉</h3>
      <p style="margin-top:10px;">Here is your special gift 🎁</p>
    `;

    startConfetti();

    // 🎁 Beautiful buttons
    giftContainer.innerHTML=`
      <div class="giftCardBox" onclick="showBirthdayMessage()">🎂 Birthday Message</div>
      <div class="giftCardBox" onclick="alert('🎮 Fun Game 🎮')">🎮 Fun Game</div>
    `;

  } else {
    finalMsg.innerHTML=`<p style="color:#ff6f91;font-weight:700;">Incorrect ❌ Try again!</p>`;
    giftContainer.innerHTML="";
  }
}

// Confetti
const canvas=document.getElementById('confetti');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let confetti=[];
function randomColor(){ const colors=['#ff6f91','#ff9671','#ffc75f','#f9f871','#a0e7e5','#43e97b','#38f9d7','#ffcbf2','#ffadad']; return colors[Math.floor(Math.random()*colors.length)]; }
function createConfetti(){for(let i=0;i<300;i++){confetti.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*8+2,d:Math.random()*50,color:randomColor(),shape:['circle','heart','star'][Math.floor(Math.random()*3)]});}}
function drawConfetti(){ctx.clearRect(0,0,canvas.width,canvas.height); confetti.forEach(c=>{ ctx.fillStyle=c.color; ctx.beginPath(); if(c.shape==='circle'){ctx.arc(c.x,c.y,c.r,0,Math.PI*2);} else if(c.shape==='heart'){ctx.moveTo(c.x,c.y); ctx.arc(c.x-3,c.y-3,5,0,Math.PI); ctx.arc(c.x+3,c.y-3,5,0,Math.PI); ctx.lineTo(c.x,c.y+5);} else if(c.shape==='star'){for(let i=0;i<5;i++){ctx.lineTo(c.x+c.r*Math.cos((18+i*72)/180*Math.PI),c.y-c.r*Math.sin((18+i*72)/180*Math.PI));}} ctx.fill();}); updateConfetti(); }
function updateConfetti(){confetti.forEach((c,i)=>{c.y+=2;if(c.y>canvas.height){confetti[i].y=-10;}});}
function startConfetti(){createConfetti(); setInterval(drawConfetti,20);}

// Balloons
const balloonCanvas=document.getElementById('balloons');
const bctx=balloonCanvas.getContext('2d');
balloonCanvas.width=window.innerWidth;
balloonCanvas.height=window.innerHeight;
let balloons=[];
function createBalloons(){for(let i=0;i<20;i++){balloons.push({x:Math.random()*balloonCanvas.width,y:balloonCanvas.height+Math.random()*300,r:20+Math.random()*15,color:randomColor(),speed:1+Math.random()*2});}}
function drawBalloons(){bctx.clearRect(0,0,balloonCanvas.width,balloonCanvas.height); balloons.forEach(b=>{bctx.fillStyle=b.color;bctx.beginPath();bctx.ellipse(b.x,b.y,b.r*0.7,b.r,0,0,Math.PI*2);bctx.fill(); b.y-=b.speed;if(b.y<-50)b.y=balloonCanvas.height;}); requestAnimationFrame(drawBalloons);}
createBalloons(); drawBalloons();

function showBirthdayMessage(){

  const finalMsg = document.getElementById("finalMsg");
  const giftContainer = document.getElementById("giftCardContainer");

  // Hide buttons
  giftContainer.innerHTML = "";

  // Beautiful long message
  finalMsg.innerHTML = `
    <h3 style="font-weight:900;">🎂 Happy Birthday Aisha ❤️</h3>
    <p style="margin-top:15px; line-height:1.6; font-size:1rem;">
    Aaj ka din mere liye bohat special hai, kyunki aaj wo din hai jab duniya ko tum jaisi beautiful aur amazing insan mili ❤️  
    Aisha, tum sirf ek naam nahi ho… tum ek feeling ho, ek sukoon ho, ek smile ho jo bina wajah bhi aa jati hai 😊  

    Jab se tum meri life mein aayi ho, sab kuch change ho gaya hai. Har din thoda zyada beautiful lagta hai, har moment thoda zyada special ho jata hai.  
    Tumhari baatein, tumhari hasi, tumhara style… sab kuch literally perfect hai 💫  

    Main chahta hoon ke tum hamesha aise hi khush raho, smile karti raho aur apni life ke har dream ko achieve karo.  
    Aur haan… ek chhoti si selfish wish bhi hai meri 😌  
    ke main hamesha tumhari life ka part rahun… tumhari khushiyon ka reason banun ❤️  

    I love you so much Aishu 💖  
    Aur aaj ke din bas yehi kehna hai…  
    Happy Birthday meri jaan 🎉🎂✨
    </p>
  `;
}

window.addEventListener('resize',()=>{canvas.width=balloonCanvas.width=window.innerWidth; canvas.height=balloonCanvas.height=window.innerHeight;});
</script>

</body>
</html>
