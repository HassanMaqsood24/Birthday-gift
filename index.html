<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aisha's Birthday 🎉</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .card {
      background: rgba(255,255,255,0.15);
      border-radius: 25px;
      padding: 40px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease-in-out;
      max-width: 500px;
      position: relative;
    }

    .date {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffd700;
      text-shadow: 2px 2px 10px #ff69b4, 0 0 20px #ff69b4;
      margin-bottom: 15px;
      position: relative;
      display: inline-block;
    }

    .date span {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: #ffd700;
    }

    h1 {
      font-weight: 600;
      color: #ff3cac;
      animation: glow 2s infinite alternate;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 25px #fff; }
    }

    #countdown {
      font-size: 2.5rem;
      font-weight: bold;
      margin-top: 15px;
      color: #ff5f6d;
    }

    .time-labels {
      margin-top: 5px;
      font-size: 0.9rem;
      color: #fff8;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    #typing {
      font-size: 1.2rem;
      margin-top: 15px;
      min-height: 60px;
      color: #ff6f91;
    }

    @media (max-width: 576px) {
      #countdown { font-size: 2rem; }
      h1 { font-size: 1.5rem; }
      #typing { font-size: 1rem; }
      .date { font-size: 1.2rem; }
      .date span { font-size: 0.6rem; }
      .time-labels { font-size: 0.8rem; gap: 8px; }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
  <div class="card text-center">
    <div class="date">📅<span>March</span> 27</div>

    <h1>🎂 Aisha, it's your Birthday!</h1>
    <div id="typing"></div>

    <div id="countdown">Loading...</div>
    <div class="time-labels">Hours&nbsp;&nbsp;Minutes&nbsp;&nbsp;Seconds</div>
  </div>
</div>

<canvas id="confetti"></canvas>
<canvas id="balloons"></canvas>

<script>
  const countdownEl = document.getElementById("countdown");
  const typingText = "Hassan is waiting for your Birthday... A special gift card for you! 🎁";
  let index = 0;
  const typingEl = document.getElementById("typing");

  function typeEffect() {
    if (index < typingText.length) {
      typingEl.innerHTML += typingText.charAt(index);
      index++;
      setTimeout(typeEffect, 50);
    }
  }
  typeEffect();

  const targetDate = new Date("March 27, 2026 00:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const diff = targetDate - now;
    if (diff <= 0) {
      countdownEl.innerHTML = "🎉 Surprise Time! 🎈";
      startConfetti();
      return;
    }
    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    countdownEl.innerHTML = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
  }

  setInterval(updateCountdown, 1000);

  // Confetti
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let confetti = [];

  function randomColor() {
    const colors = ['#ff6f91','#ff9671','#ffc75f','#f9f871','#a0e7e5','#43e97b','#38f9d7'];
    return colors[Math.floor(Math.random()*colors.length)];
  }

  function createConfetti(){for(let i=0;i<200;i++){confetti.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*8+2,d:Math.random()*50,color:randomColor()});}}
  function drawConfetti(){ctx.clearRect(0,0,canvas.width,canvas.height);confetti.forEach(c=>{ctx.fillStyle=c.color;ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();});updateConfetti();}
  function updateConfetti(){confetti.forEach((c,i)=>{c.y+=Math.cos(c.d)+2;c.x+=Math.sin(c.d);if(c.y>canvas.height){confetti[i]={x:Math.random()*canvas.width,y:-10,r:c.r,d:c.d,color:c.color};}});}
  function startConfetti(){createConfetti();setInterval(drawConfetti,20);}

  // Balloons animation
  const balloonCanvas = document.getElementById('balloons');
  const bctx = balloonCanvas.getContext('2d');
  balloonCanvas.width = window.innerWidth;
  balloonCanvas.height = window.innerHeight;
  let balloons=[];
  function createBalloons(){for(let i=0;i<20;i++){balloons.push({x:Math.random()*balloonCanvas.width,y:balloonCanvas.height+Math.random()*300,r:20+Math.random()*15,color:randomColor(),speed:1+Math.random()*2});}}
  function drawBalloons(){bctx.clearRect(0,0,balloonCanvas.width,balloonCanvas.height);balloons.forEach(b=>{bctx.fillStyle=b.color;bctx.beginPath();bctx.ellipse(b.x,b.y,b.r*0.7,b.r,0,0,Math.PI*2);bctx.fill();b.y-=b.speed;if(b.y<-50){b.y=balloonCanvas.height+Math.random()*100;b.x=Math.random()*balloonCanvas.width;}});requestAnimationFrame(drawBalloons);}
  createBalloons();
  drawBalloons();

  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;balloonCanvas.width=window.innerWidth;balloonCanvas.height=window.innerHeight;});
</script>

</body>
</html>
